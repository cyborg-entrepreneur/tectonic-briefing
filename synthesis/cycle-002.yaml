    status: planned
    one_liner: >
      An RL-type study using the full tectonic corpus to analyze the effectiveness of the
      different orienting strategies that emerge over time.
    seed_dataset: >
      The read-mode-labeled inventory built this cycle is the proto-dataset: each conditional
      chain is now a labeled (read_mode, break_type, signature, outcome) tuple with a resolved
      or indeterminate target (synthesis/_raw/slice{A,B,C}.md; cross-tabs in cycle-002.yaml).
      Cycles 3+ extend it prospectively; every daily briefing now emits O/R/H-tagged chains
      with >=2 release paths and a ripeness interval (per the daily Read-Mode Discipline).
    research_question: >
      Treating read-mode + the shi-read moves (configuration / disposition / ripeness /
      transformation / positional leverage) as a policy over how to read a live configuration,
      which orienting strategies maximize realized analytical value (graceful-degradation /
      low catastrophic-failure rate) under graded dynamism? The orienting-vs-knowledge-
      representation theory predicts orienting policies dominate as flux rises and representation
      policies dominate only in the settled/fast-settling tail.
    connections:
      - "Empirical wing of the orienting-vs-knowledge-representation theory (bandwidth-rotation)."
      - "Parallels the Into the Flux ABM (foreseen-latent vs realized value) and the escaping-the-trap MARL design (bandwidth rotation as a first-class action)."
      - "Cross-architecture variant: run the Inference Engine + read-mode tagging against different LLM backbones to separate the model-endogenous single-vector collapse from intrinsic Knightian timing-indeterminacy (mp-010 / mp-012)."
    next_data_step: >
      Keep the per-chain labeled inventory accumulating in synthesis/ each cycle; once 4-6
      cycles (~600-800 labeled chains) exist, the corpus is large enough to fit and compare
      orienting-strategy policies.
