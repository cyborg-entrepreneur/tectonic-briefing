cycle_note: >
  Cycle 2 adds a third classification lens — Read-Mode (Orienting / Representation / Hybrid),
  grounded in the orienting-vs-knowledge-representation theory of strategic decision-making and
  the bandwidth-rotation argument (representation-within-bandwidth = KR; rotation = orienting).
  The lens was piloted on the 058->060 chains (see cycle-002-shi-discipline.md), then applied
  prospectively across the full cycle. Inventory generated by three fresh-context readers
  (031-040, 041-050, 051-060); full per-chain inventory preserved in synthesis/_raw/slice{A,B,C}.md.

inventory_source:
  files: [synthesis/_raw/sliceA.md, synthesis/_raw/sliceB.md, synthesis/_raw/sliceC.md]
  total_chains: 129
  by_slice: { A_031_040: 44, B_041_050: 52, C_051_060: 33 }
  note: >
    Counts carry minor inter-reader variance (each reader tallied threads/deep-dive questions
    slightly differently). Distributions below are the consolidated figures; treat ±3 as noise.

headline: >
  Cycle 2's central finding is that READ-MODE PREDICTS BREAK SEVERITY. Across 129 conditional
  chains, every Inverted (7) and Held-Spurious (9) outcome was a Representation- or Hybrid-read;
  not one Orienting-read inverted or failed at Z in the entire cycle. The model's failure is not
  in reading the configuration — Orienting and Hybrid reads share that competence — but in what
  it does at the terminal step: the Hybrid read collapses a live disposition into a single vector
  (the dominant failure, mapping to Type-V velocity x S2 narrative-over-physical), and the
  Representation read projects a represented template as present fact (the catastrophic failure,
  mapping to Type-VI x S5). The paradigm Representation failure — the 037-039 cross-year template
  projection — is confined to one signature (S5) that appears in 12 chains, ALL before Briefing
  040 and ZERO after: the 2026-05-13 factual-verification discipline eliminated it mid-cycle,
  proving a representation-failure is correctable by explicit discipline. Velocity miscalibration
  (Type-V, 34 chains) is again the dominant break, as in Cycle 1, and now localizes to the
  Hybrid read's single-vector collapse — a structural fix (name >=2 release paths), not a
  calibrational one. The three recalibrations for 061-090: tag every chain O/R/H and rewrite R;
  name >=2 release paths at Z (field-not-vector); state ripeness/timing for every untested-
  instrument read.

