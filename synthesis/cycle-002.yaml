read_mode_cross_tab:
  statement: "The central Cycle 2 product. Read-mode is independent of configuration competence and predicts break severity."
  worst_outcomes_by_read_mode:
    inverted_7: { O: 0, H: 5, R: 2 }
    held_spurious_9: { O: 0, H: 9, R: 0 }
    failed_Z_3: { O: 0, H: 2, R: 1 }
  key_cells:
    - "R x failed/inverted/categorical-drift x s5/s3: 13 of 13 R-reads broke or sit unresolved; ZERO R-reads held cleanly."
    - "H x type_v_velocity x s2: the modal failure — sound configuration, single-vector Z collapsing over slow/multi-path reality."
    - "O x {held, held_at_Y, type_v at worst}: 71 O-reads; NONE inverted, NONE failed-Z. Orienting degrades gracefully or holds."
  interpretation: >
    The configuration read is shared by O and H reads alike; the divergence is entirely at the
    terminal step. Hybrid reads name the right structure and then commit to one release path of a
    disposition that is a FIELD of paths (the Fed reads 045-ie-3 / 055-ie-2 are the paradigm:
    correct regime-change configuration, single benign/dovish Z vector, inverted by the hawkish
    hold). Representation reads assert a fixed structure or a prior-period template as present fact
    (037-039 cross-year projection; 055-dd-5). This is the bandwidth-rotation thesis confirmed on
    analytical reading: over-investing in a single-vector representation is the trap; orienting to
    the disposition as a field is robust.

meta_principles:
  cycle_1_promotion_review:
    - id: mp-001
      statement: "State actors with optionality hold a third option (durable silence, back-channel substitution, suspended contradiction) outside a chain's binary action-set; chains break at Y."
      cycle_2_status: promote_to_canonical
      cycle_2_evidence: "Recurred forcefully — the US-Iran deal arrived via a path outside the conditioned action-sets (033-ie-1, 040-ie-1, 046-ie-2 held_spurious/Type-VII); state-actor Failed-Y throughout slices A/B."
    - id: mp-003
      statement: "Chains predicting outcomes via a specified mechanism produce Type-VII Spurious Hits when the actual mechanism is novel architectural composition; narrative validation masks wrong structure."
      cycle_2_status: promote_to_canonical
      cycle_2_evidence: "8 Type-VII cases; the Iran-deal endpoint repeatedly arrived via a different mechanism than specified (033-ie-1, 034-ie-2, 040-ie-1, 046-ie-2)."
    - id: mp-005
      statement: "Coordination apparatuses (FOMC, OPEC, G7, EU) produce dispersion not coherence under stress; chains break at Z."
      cycle_2_status: promote_to_canonical
      cycle_2_evidence: "G7/Fed chains held precisely BECAUSE they predicted hollowing/bilateralism (034-ie-4, 035-ie-4 held); the 17 Jun FOMC delivered a hawkish dispersion, not coherence."
    - id: mp-010
      statement: "Velocity miscalibration is partly intrinsic to Knightian timing-indeterminacy and partly endogenous to the model (mean-trajectory regression / narrative-time compression)."
      cycle_2_status: reinforced_and_refined
      cycle_2_evidence: "Type-V dominant again (34). Cycle 2 LOCALIZES the model-endogenous component: it is the Hybrid read's single-vector collapse (Type-V concentrates in H-reads x S2). See mp-012."
    - id: mp-002
      statement: "Co-present contradictory states function as a buffer absorbing predicted forcing-functions until destroyed by a discrete agentic-novelty event."
      cycle_2_status: recurred_provisional
      cycle_2_evidence: "The Lebanon ceasefire-and-airstrike (060) and talks-and-strikes (slice B) buffers; still provisional pending a third cycle."
    - id: mp-004
      statement: "Corridor-absorbed news cycles let periphery structural events compound un-registered (Type-I-eligible)."
      cycle_2_status: recurred_provisional
      cycle_2_evidence: "Sahel/Mali chains (031-ie-2, 033-ie-2, 034-ie-3) and the fast Iran settlement registered late; topic-rotation recalibration only partly mitigated."
    - id: mp-006
      statement: "Chains on rhetorical-declarative dynamics over-weight price-discovery transmission (the Sanctuary Discount)."
      cycle_2_status: recurred_provisional
    - id: mp-007
      statement: "Chains assuming an operative regulatory architecture miss the shift to private-actor coordination (Capability-Governance Inversion)."
      cycle_2_status: recurred_provisional
      cycle_2_evidence: "The AI-export directive (058-060) is the inversion's sharpest instance — a state RECALL of a deployed model, the constraint migrating from lab to state to international precedent."
    - id: mp-008
      statement: "'X reaches Y therefore Z' chains miss buffer revelations and produce velocity miscalibration."
      cycle_2_status: recurred_provisional
    - id: mp-009
      statement: "Single-scale structural reads increasingly require multi-scale analysis under simultaneous multi-scale failure."
      cycle_2_status: recurred_provisional
  cycle_2_new:
    - id: mp-011
      statement: >
        READ-MODE PREDICTS BREAK SEVERITY. Across a full cycle, every Inverted and Held-Spurious
        outcome is a Representation- or Hybrid-read; Orienting-reads do not invert or fail-Z. The
        error is not in configuration recognition (shared by O and H) but in the terminal-step
        commitment to a single vector (H) or a represented template (R).
      instances: [045-ie-3, 055-ie-2, 050-ie-3, 032-ie-4, 040-ie-1, 046-ie-2, 055-dd-5, 037-th, 038-ie-C]
      status: provisional_strong   # 3-slice-robust within Cycle 2; canonical after Cycle 3 recurrence
