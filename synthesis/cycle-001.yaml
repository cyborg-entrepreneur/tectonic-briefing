# ============================================================
# META-PRINCIPLES
# ============================================================
# All Cycle 1 principles are PROVISIONAL. Promotion to canonical requires recurrence
# in Cycle 2. Each principle cites ≥2 supporting chains.

meta_principles:
  - id: mp-001
    statement: "Chains terminating in state-actor execution of a credentialing-act systematically break at step Y because state actors with optionality have a third option (durable silence, back-channel substitution, suspended contradiction) the chain's binary action-set does not contain."
    instances: ["002-ie-1", "003-ie-1", "009-ie-2", "010-ie-1", "024-ie-1", "025-ie-3"]
    status: provisional
    note: "Most consequential principle of the cycle. Six chains broke because they assumed state-actor binaries (execute-or-not, attend-or-not, statement-or-not) when the actor's strategic position was optionality — including the option of refusing to play in the chain's action space at all. This is the structural mechanism behind both Type-I (Saudi durable silence as novel action) and Type-V (timing wrong because the third option absorbs pressure) failures."

  - id: mp-002
    statement: "When two contradictory states (ceasefire-and-blockade, talks-and-strikes, hawkish-vote-and-dovish-statement) are co-present and politically necessary to both parties, the contradiction operates as a buffer that absorbs predicted forcing-function activations until it is destroyed by a discrete agentic-novelty event."
    instances: ["009-ie-2", "017-ie-1", "018-ie-1", "018-ie-2", "020-ie-2", "029-ie-1"]
    status: provisional
    note: "The suspended-contradiction emerged as the dominant structural form of the cycle. Six chains predicted forcing-function activation that did NOT occur because the suspended contradiction continued to function. When the contradiction did break (Project Freedom, Briefing 029), it was via a novel architectural move (Sabbath Operationalization) not via the chain's specified mechanism. The principle: structural prediction must include a Suspended-Contradiction-Buffer term, calibrated to the political cost of explicit acknowledgment for both parties."

  - id: mp-003
    statement: "Chains predicting outcomes via specified mechanisms produce Type-VII (Spurious Hit) errors when the actual mechanism is novel architectural composition rather than execution of a known mechanism — the briefing achieves narrative validation while the structural understanding is wrong."
    instances: ["002-ie-2", "004-ie-4", "012-ie-2", "013-ie-3", "014-ie-3", "020-ie-2", "022-ie-5", "024-ie-4"]
    status: provisional
    note: "Eight chains classified Held-Spurious. The pattern: chain Z arrives, but via a different mechanism than chain Y specified. Most concerning: this generates apparent confirmation of the briefing's analytical apparatus when the apparatus's structural understanding was actually wrong. Cycle 2+ should report Type-VII rate explicitly per chain and treat increase in Type-VII rate as a degradation signal even if total break rate falls."

  - id: mp-004
    statement: "When the corridor news cycle absorbs a regional or systemic event into a single high-attention storyline (e.g., Iran war), structural events at the periphery (Sahel keystone-removal, Korean fertility reversal, AMOC threshold transition, UAE OPEC departure) generate Type-I-eligible novel actions that fail to register in the corridor's analytic apparatus until they have already compounded."
    instances: ["015-ie-3", "021-ie-1", "021-ie-5", "023-ie-2", "024-ie-1", "026-ie-2"]
    status: provisional
    note: "The Peripheral Assertion pattern (META-1, Briefing 021) operates as a structural mechanism for Type-I-style breaks in chains that assume corridor-wide coverage. The principle is reflexive: it implicates the briefing's own attention budget. Six chains in this cluster broke or under-resolved because peripheral signals (Sahel, demographic, climate) compounded in the latency-phase between corridor cycles. Suggests Cycle 2+ allocate explicit non-corridor analytical bandwidth at chain-construction stage, not at chain-classification stage."

  - id: mp-005
    statement: "Chains predicting institutional-coordination outcomes (FOMC unified hawkishness, OPEC discipline, EU veto coherence, ECB-Fed coordination) systematically break at step Z because late-modern coordination apparatuses produce dispersion (Verdict Compression, 8-4 votes, durable silences, multi-track re-routing) rather than coherence under stress."
    instances: ["020-ie-3", "022-ie-5", "023-ie-1", "024-ie-1", "024-ie-4", "025-ie-3"]
    status: provisional
    note: "Six chains (FOMC, Saudi-OPEC, Russian-track) broke at the institutional-coordination step. Verdict Compression (Briefing 026) — Powell's 8-4 dissent — is the canonical empirical instance: the apparatus produced a verdict but the reconciliation function had departed. The principle: under stress, coordination apparatuses produce surface output (votes, statements, communiqués) that lack the substantive coherence the chain assumed. Cycle 2+ should test in ECB voting splits, IMF Spring/Annual Meeting communiqué coherence, G7 substantive content, NATO alliance management, UN Security Council voting."

  - id: mp-006
    statement: "Chains operating on rhetorical-declarative dynamics (presidential statements, ceasefire declarations, sanctions announcements) systematically over-weight the price-discovery transmission of those signals because marketplaces have learned to discount constraint-apparatus-absent declarations into a calibrated routine — the Sanctuary Discount."
    instances: ["003-ie-7", "006-ie-1", "013-ie-1", "014-ie-3", "029-ie-1", "030-ie-1"]
    status: provisional
    note: "The Sanctuary Discount (Briefing 030) is the empirical name for what was structurally happening across the cycle: each Trump declaration, Iranian counter-declaration, and ceasefire announcement produced smaller market reactions than the prior. Six chains over-weighted declarative transmission. The response architecture has been routinized into discount; perception is intact, credit-granting has hollowed."

  - id: mp-007
    statement: "Chains that assume a regulatory-governance architecture is operative systematically miss the structural shift toward private-actor coordination as the substitute regime — the Capability-Governance Inversion — which operates at faster cadence than public regulation but bifurcates under participant-divergence stress (Coordination Bifurcation)."
    instances: ["007-ie-3", "019-ie-1", "020-ie-1", "021-ie-3", "024-ie-5", "025-ie-1", "030-ie-2"]
    status: provisional
    note: "Seven chains involve the AI-governance, cyber-physical, or climate-financial architectures whose substitute-regime is private-actor coordination (Glasswing, ASL-4 partner-access, Cross-Lab Alignment Coalition). Briefing 025 named the bifurcation risk. The principle: chains conditioning on public regulation must include a substitute-regime-coordination-stability variable. EU AI Act trilogue collapse (Briefing 030) is the cycle-end instantiation."

  - id: mp-008
    statement: "Chains terminating in 'X reaches level Y therefore Z follows' systematically miss buffer revelations — most consequentially, that the suspended-contradiction itself functions as a buffer not in the structural-vocabulary registry as such — and produce velocity miscalibration when the buffer absorbs the predicted pressure."
    instances: ["001-ie-1", "009-ie-2", "012-ie-1", "017-ie-1", "018-ie-2", "020-ie-2"]
    status: provisional
    note: "Six chains broke because a buffer absorbed pressure: SPR/futures-spot decoupling, suspended-contradiction architecture, Pakistan-Oman shuttle, back-channel diplomacy. The principle: every chain should explicitly enumerate buffers that could absorb the chain's pressure, including institutional-novelty buffers like suspended-contradiction. Connects to META-3 Threshold Cascade — but operates in reverse: the missing instantiation is Buffer Persistence rather than Buffer Collapse. Provisional candidate for new META-3 instantiation."

  - id: mp-009
    statement: "Chains tracking structural patterns at one scale (actor, regime, institution) increasingly require multi-scale analysis because the post-2024 configuration produces simultaneous failures at multiple scales (Mali keystone-removal + UAE OPEC cartel-dissolution + War Powers statutory-bypass within the same week)."
    instances: ["023-ie-2", "024-ie-3", "025-ie-1", "025-ie-2", "026-ie-2"]
    status: provisional
    note: "Five chains required multi-scale analysis to be even legible. The principle: contemporary structural configurations produce simultaneous failures at multiple scales — actor-scale (keystone removal), regime-scale (cartel dissolution), institutional-scale (statutory bypass), substitute-regime-scale (coordination bifurcation). The empirical signature of the post-2024 configuration is the multi-scale failure-pattern compound — and the absence of a corresponding response architecture."

  - id: mp-010
    statement: |
      Velocity miscalibration in chains generated by LLM plausibility engines is partly intrinsic
      to Knightian timing-indeterminacy and partly endogenous to the model's mean-trajectory
      regression and narrative-time compression. The two components cannot be separated from
      a single cycle's data; they require either cross-architecture comparison (different LLMs
      running the same Inference Engine) or held-out chain pairs (point-velocity framing vs
      half-life framing).
    instances: ["001-ie-1", "009-ie-2", "012-ie-1", "013-ie-1", "024-ie-1"]
    status: provisional
    note: |
      First meta-principle to make the LLM cognitive layer explicit. The Cycle 1 distribution
      shows Type-V × S1 + Type-V × S2 = 11 of 15 Type-V cases (73%); the dominant cognitive
      failure beneath the dominant structural failure is the conjunction of mean-trajectory
      regression on historical cascade analogues and narrative-time compression of multi-week
      physical processes. But Cycle 1 cannot tell us how much of the velocity miscalibration is
      Knightian floor (the world genuinely will not commit to a timing the chain author could
      have known) and how much is LLM-endogenous compression (a different architecture would
      not write the chain on the same clock). Recurrence in Cycle 2+ requires either (a) the
      same Type-V × S1/S2 dominance under prospective tagging per rec-007, or (b) a successful
      cross-architecture experiment showing differential signature distribution. The principle
      is the audit's first formal step toward operationalizing its diagnostic-of-LLM-cognition
      wing as something distinct from its phenomenology-of-Knightian-uncertainty wing.

