      note: "Same signature as 024-ie-1: chain regresses to the historical centroid of Saudi-must-respond and concentrates plausibility on the modal completion. Sustained silence — the off-distribution durable third option — remains invisible to the model's action space because it is structurally absent from training-corpus exemplars of cartel-anchor crisis."

# ============================================================
# LLM COGNITIVE SIGNATURES (Cycle 1) — parallel taxonomy
# ============================================================
# S1-S7 classify what failed in the model that generated the chain, not what
# failed in the world. Cycle 1 tagging is RETROSPECTIVE; from Cycle 2 forward
# signatures are tagged at chain creation per rec-007.
#
# The cross-tabulation against Type I-VII is the analytical product — the same
# structural break (e.g. Type-V) can come from different cognitive failure modes
# (S1 mean-trajectory regression vs S2 narrative-time compression), and the
# distribution of those modes is the diagnostic the audit's diagnostic-of-LLM-
# cognition wing is built to produce.

llm_cognitive_signatures:
  taxonomy:
    s1_mean_trajectory_regression:
      mechanism: "Model averages historical cascade analogues; specific-instance velocity smoothed toward training-data mean"
      maps_to: [type_v]
      empirical_signature: "Chains whose Y-step timing matches the centroid of historical analogues but not the actual instance"
    s2_narrative_over_physical:
      mechanism: "Causal grammar parses cleanly; physics doesn't. Months get compressed to days because narrative tokens have their own clock"
      maps_to: [type_v, type_vii]
      empirical_signature: "Chains where the inferential step is rhetorically compact but materially heavy (requires capital reallocation, regulatory action, multi-week diplomacy)"
    s3_plausibility_mass_concentration:
      mechanism: "Emits most-probable completion; black-swan / low-prior actions under-weighted"
      maps_to: [type_i]
      empirical_signature: "Chains conditioning on the modal actor / move (regulators-act, Iran-closes, markets-price) and missing the off-distribution actor or move"
    s4_reflexive_blindness:
      mechanism: "Doesn't simulate actors reading consensus prediction and adjusting; Hayek-Lucas-Goodhart territory invisible"
      maps_to: [type_ii]
      empirical_signature: "Chains that fail because the predicted actor read the prediction (or the consensus the prediction reflects) and acted to invalidate it"
    s5_categorical_stickiness:
      mechanism: "Anchors on training-time categories when events have moved past them or the categories themselves are dissolving"
      maps_to: [type_vi]
      empirical_signature: "Chains using a noun whose referent has shifted under it (Lebanese state, FOMC unified, OPEC discipline, ceasefire scope)"
    s6_buffer_blindness:
      mechanism: "Treats persistent states as constants; training data over-represents persistence vs transition"
      maps_to: [type_iv]
      empirical_signature: "Chains that assumed a buffer (SPR, dollar primacy, OPEC discipline, suspended-contradiction, ceasefire ambiguity) and were silent on the buffer's variability"
    s7_mechanism_outcome_decoupling:
      mechanism: "Emits outcome without binding to mechanism; any mechanism producing Z counts as confirmation"
      maps_to: [type_vii]
      empirical_signature: "Chains whose Z-step is named generically enough that any mechanism producing Z counts as confirmation — the structural understanding is wrong but the chain reads as right"

  primary_distribution:
    s1_mean_trajectory_regression: 3
    s2_narrative_over_physical: 10
    s3_plausibility_mass_concentration: 3
    s4_reflexive_blindness: 4
    s5_categorical_stickiness: 1
    s6_buffer_blindness: 1
    s7_mechanism_outcome_decoupling: 9
    total: 31

  primary_distribution_pct:
    s1_mean_trajectory_regression: 10
    s2_narrative_over_physical: 32
    s3_plausibility_mass_concentration: 10
    s4_reflexive_blindness: 13
    s5_categorical_stickiness: 3
    s6_buffer_blindness: 3
    s7_mechanism_outcome_decoupling: 29

  secondary_distribution:
    # Counted only when secondary differs from primary; null secondaries excluded.
    s1_mean_trajectory_regression: 2
    s2_narrative_over_physical: 7
    s3_plausibility_mass_concentration: 4
    s5_categorical_stickiness: 3
    s6_buffer_blindness: 5

  cross_tabulation:
    # Each cell: { count: N, examples: [chain_ids] }. Cells listed only when count > 0.
    type_v_x_s1: { count: 3, examples: ["001-ie-1", "024-ie-1", "025-ie-3"] }
    type_v_x_s2: { count: 8, examples: ["004-ie-1", "005-ie-1", "006-ie-1", "009-ie-2", "011-ie-2", "012-ie-1", "013-ie-1", "016-ie-1"] }
    type_v_x_s3: { count: 3, examples: ["010-ie-1", "011-ie-3", "015-ie-2"] }
    type_v_x_s6: { count: 1, examples: ["017-ie-1"] }
    type_vii_x_s7: { count: 9, examples: ["002-ie-2", "004-ie-4", "012-ie-2", "013-ie-3", "014-ie-3", "019-ie-3", "020-ie-2", "022-ie-5", "024-ie-4"] }
    type_ii_x_s4: { count: 4, examples: ["002-ie-1", "003-ie-1", "006-ie-5", "009-ie-3"] }
    type_iii_x_s2: { count: 2, examples: ["004-ie-2", "023-ie-1"] }
    type_iii_x_s5: { count: 1, examples: ["010-ie-3"] }

  dominant_cells_commentary: |
    Three cells carry 26 of 31 chains (84%). Type-V × S2 is the largest single cell at
    8 chains — chains where the narrative cleanly compresses what materially required
    weeks of diplomatic, regulatory, or market-physical motion. Type-VII × S7 at 9 chains
    is the canonical mechanism-outcome-decoupling pattern: the chain's Z-step is named
    generically enough to absorb any mechanism that produces it, and the briefing achieves
    apparent confirmation while the structural understanding was wrong. Type-II × S4 at
    4 chains is the cleanest theoretical match: every Type-II break in the cycle was an
    instance of an actor reading the consensus prediction and adjusting, which is exactly
    what the model's reflexive blindness should produce. Type-V × S1 (3 chains) is the
    Saudi-silence and Hormuz-cascade cluster — chains whose Y-step timing matches the
    centroid of historical analogues but not the specific instance.

  honest_caveat: |
    Cycle 1 signature classification is RETROSPECTIVE. From Cycle 2 forward, signatures
    are tagged at chain creation per rec-007, which produces cleaner data. The retrospective
    pass establishes the taxonomy and provides Cycle 1's baseline distribution but should
    not be over-interpreted given the inferential nature of the tagging. In particular:
    (a) the Type-V × S1 vs Type-V × S2 split is the closest call — many Type-V chains
    arguably exhibit both signatures, and the primary assignment depends on which is
    judged the proximate cognitive failure; (b) the Type-VII × S7 cluster is at risk of
    becoming a tautology if S7 is defined too loosely (mechanism-outcome decoupling and
    spurious-hit are near-synonymous by construction); (c) S6 buffer-blindness is under-
    represented as primary (1 case) but appears 5x as secondary, mirroring the Type-IV
    pattern from §5.4 — both diagnose the same suspended-contradiction blindness from
    different sides.

